<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS-Only Spooky Halloween Scene</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-night: radial-gradient(circle at top, #1f2940 0, #050814 60%);
      --bg-spooky: radial-gradient(circle at top, #39113a 0, #050014 65%);
      --moon-color: #fef9c3;
      --house-color: #111827;
      --house-highlight: #1f2937;
      --window-off: #020617;
      --window-on: #facc15;
      --door-color: #020617;
      --door-inner: #020617;
      --hill-color: #020617;
      --grave-color: #111827;
      --pumpkin-body: #ea580c;
      --pumpkin-face: #020617;
      --ghost-body: #e5e7eb;
      --ghost-shadow: rgba(15, 23, 42, 0.35);
      --cloud-color: rgba(15, 23, 42, 0.7);
      --text-color: #e5e7eb;
      --accent: #f97316;
      --focus-outline: 2px solid #facc15;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #020617;
      color: var(--text-color);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    .scene-wrapper {
      width: 100%;
      max-width: 900px;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.75rem;
    }

    .toggle-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .toggle-label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
    }

    .toggle-label:focus-visible {
      outline: none;
    }

    .toggle-input:focus-visible + .toggle-label {
      outline: var(--focus-outline);
      outline-offset: 4px;
      border-radius: 999px;
    }

    .toggle-knob {
      width: 42px;
      height: 22px;
      border-radius: 999px;
      border: 2px solid var(--accent);
      position: relative;
    }

    .toggle-knob::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--accent);
      transform: translateY(-50%);
      transition: transform 0.25s ease;
    }

    .toggle-text {
      color: #e5e7eb;
    }

    .toggle-input:checked + .toggle-label .toggle-knob::before {
      transform: translate(17px, -50%);
    }

    .scene {
      position: relative;
      aspect-ratio: 16 / 9;
      max-height: min(70vh, 550px);
      border-radius: 24px;
      overflow: hidden;
      background: var(--bg-night);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7);
      isolation: isolate;
    }

    .toggle-input:checked ~ .scene {
      background: var(--bg-spooky);
    }

    .sky {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .moon {
      position: absolute;
      top: 8%;
      right: 12%;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 30% 30%, #ffffff, var(--moon-color));
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(250, 250, 210, 0.6);
    }

    .cloud {
      position: absolute;
      top: 12%;
      width: 120px;
      height: 40px;
      background: var(--cloud-color);
      border-radius: 999px;
      filter: blur(1px);
      opacity: 0.8;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: var(--cloud-color);
      border-radius: 999px;
    }

    .cloud::before {
      width: 70px;
      height: 60px;
      top: -25px;
      left: 10px;
    }

    .cloud::after {
      width: 80px;
      height: 55px;
      top: -20px;
      right: 0;
    }

    .cloud--1 {
      left: -20%;
      animation: cloud-drift 40s linear infinite;
      top: 15%;
    }

    .cloud--2 {
      left: 60%;
      animation: cloud-drift 55s linear infinite reverse;
      top: 20%;
    }

    .cloud--3 {
      left: 20%;
      animation: cloud-drift 50s linear infinite;
      top: 10%;
    }

    @keyframes cloud-drift {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(150%);
      }
    }

    .stars {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 10% 20%, #e5e7eb 0, transparent 2px),
        radial-gradient(circle at 30% 80%, #e5e7eb 0, transparent 2px),
        radial-gradient(circle at 80% 30%, #e5e7eb 0, transparent 2px),
        radial-gradient(circle at 60% 15%, #e5e7eb 0, transparent 2px),
        radial-gradient(circle at 50% 60%, #e5e7eb 0, transparent 2px);
      opacity: 0.6;
      mix-blend-mode: screen;
    }

    .hill {
      position: absolute;
      bottom: -10%;
      left: -15%;
      width: 130%;
      height: 60%;
      background: radial-gradient(circle at 50% 0, #020617 0, var(--hill-color) 60%);
      border-top-left-radius: 50%;
      border-top-right-radius: 50%;
      z-index: 2;
    }

    .house {
      position: absolute;
      bottom: 16%;
      left: 20%;
      width: 180px;
      height: 180px;
      z-index: 3;
    }

    .house-body {
      position: absolute;
      bottom: 0;
      left: 15%;
      width: 70%;
      height: 72%;
      background: linear-gradient(to bottom, var(--house-highlight), var(--house-color));
      border-radius: 6px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.7);
    }

    .roof {
      position: absolute;
      bottom: 68%;
      left: 10%;
      width: 80%;
      height: 45px;
      background: #020617;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.7);
    }

    .chimney {
      position: absolute;
      bottom: 80%;
      left: 65%;
      width: 18px;
      height: 60px;
      background: #020617;
      border-radius: 3px 3px 0 0;
    }

    .window {
      position: absolute;
      top: 18%;
      width: 26px;
      height: 36px;
      background: var(--window-off);
      border-radius: 3px;
      box-shadow: inset 0 0 0 2px #020617;
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }

    .window--left {
      left: 18%;
    }

    .window--right {
      right: 18%;
    }

    .toggle-input:checked ~ .scene .window {
      background: var(--window-on);
      box-shadow:
        inset 0 0 0 2px #f59e0b,
        0 0 14px rgba(250, 204, 21, 0.9);
    }

    .door {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 44px;
      height: 60px;
      transform: translateX(-50%);
      background: var(--door-color);
      border-radius: 5px 5px 2px 2px;
      overflow: hidden;
    }

    .door-inner {
      position: absolute;
      inset: 3px;
      background: var(--door-inner);
      border-radius: 3px;
      transform-origin: left center;
      transition: transform 0.5s ease;
    }

    .door-inner::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 7px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #facc15;
    }

    .toggle-input:checked ~ .scene .door-inner {
      transform: perspective(300px) rotateY(-25deg);
    }

    .graveyard {
      position: absolute;
      bottom: 12%;
      right: 10%;
      width: 180px;
      height: 80px;
      z-index: 3;
      display: flex;
      align-items: flex-end;
      gap: 16px;
      justify-content: flex-end;
    }

    .grave {
      width: 36px;
      height: 52px;
      background: linear-gradient(to bottom, #111827, #020617);
      border-radius: 18px 18px 4px 4px;
      box-shadow: 0 8px 12px rgba(0, 0, 0, 0.7);
      position: relative;
    }

    .grave::before {
      content: "";
      position: absolute;
      bottom: -6px;
      left: -6px;
      right: -6px;
      height: 8px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 50%;
      filter: blur(3px);
    }

    .grave::after {
      content: "RIP";
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      letter-spacing: 0.05em;
      color: #6b7280;
    }

    .grave--2 {
      transform: scale(1.1) translateY(-6px);
    }

    .pumpkin {
      position: absolute;
      bottom: 10%;
      left: 50%;
      width: 70px;
      height: 55px;
      transform: translateX(-50%);
      background: radial-gradient(circle at 30% 20%, #fed7aa 0, var(--pumpkin-body) 45%, #9a3412 100%);
      border-radius: 50%;
      box-shadow: 0 10px 14px rgba(0, 0, 0, 0.7);
      z-index: 4;
    }

    .pumpkin::before,
    .pumpkin::after {
      content: "";
      position: absolute;
      top: 7px;
      width: 28px;
      height: 45px;
      border-radius: 50%;
      border: 2px solid rgba(124, 45, 18, 0.7);
      border-left: none;
      border-right: none;
    }

    .pumpkin::before {
      left: 8px;
    }

    .pumpkin::after {
      right: 8px;
    }

    .pumpkin-eye {
      position: absolute;
      top: 18px;
      width: 14px;
      height: 12px;
      background: var(--pumpkin-face);
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
      transition: background 0.35s ease, box-shadow 0.35s ease;
    }

    .pumpkin-eye--left {
      left: 16px;
    }

    .pumpkin-eye--right {
      right: 16px;
    }

    .pumpkin-mouth {
      position: absolute;
      bottom: 10px;
      left: 50%;
      width: 32px;
      height: 16px;
      transform: translateX(-50%);
      background: var(--pumpkin-face);
      clip-path: polygon(0 100%, 20% 40%, 40% 80%, 60% 40%, 80% 80%, 100% 40%, 100% 100%);
      transition: background 0.35s ease, box-shadow 0.35s ease;
    }

    .toggle-input:checked ~ .scene .pumpkin-eye,
    .toggle-input:checked ~ .scene .pumpkin-mouth {
      background: #facc15;
      box-shadow: 0 0 14px rgba(250, 204, 21, 0.9);
    }

    .ghost {
      position: absolute;
      z-index: 5;
      width: 70px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .ghost-body {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 0, #ffffff, var(--ghost-body));
      border-radius: 40px 40px 30px 30px;
      box-shadow: 0 12px 18px var(--ghost-shadow);
      overflow: hidden;
    }

    .ghost-body::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: -10px;
      right: -10px;
      height: 24px;
      background: #e5e7eb;
      clip-path: polygon(0 30%, 10% 0, 20% 30%, 30% 0, 40% 30%, 50% 0, 60% 30%, 70% 0, 80% 30%, 90% 0, 100% 30%, 100% 100%, 0 100%);
    }

    .ghost-eye {
      position: absolute;
      top: 28px;
      width: 8px;
      height: 14px;
      border-radius: 999px;
      background: #020617;
    }

    .ghost-eye--left {
      left: 22px;
    }

    .ghost-eye--right {
      right: 22px;
    }

    .ghost-mouth {
      position: absolute;
      top: 46px;
      left: 50%;
      width: 16px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 0 0 16px 16px;
      border: 3px solid #020617;
      border-top: none;
    }

    .ghost--main {
      left: -15%;
      top: 32%;
      animation: ghost-float 18s linear infinite;
    }

    .ghost--secondary {
      right: -20%;
      top: 20%;
      opacity: 0;
      transform: scale(0.8);
      animation: ghost-float-secondary 22s linear infinite;
      animation-play-state: paused;
    }

    .toggle-input:checked ~ .scene .ghost--secondary {
      opacity: 0.9;
      animation-play-state: running;
    }

    @keyframes ghost-float {
      0% {
        transform: translateX(0) translateY(0);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      50% {
        transform: translateX(140%) translateY(-10px);
      }
      90% {
        opacity: 0.9;
      }
      100% {
        transform: translateX(160%) translateY(0);
        opacity: 0;
      }
    }

    @keyframes ghost-float-secondary {
      0% {
        transform: translateX(0) translateY(0) scale(0.8);
      }
      50% {
        transform: translateX(-130%) translateY(8px) scale(0.8);
      }
      100% {
        transform: translateX(-160%) translateY(0) scale(0.8);
      }
    }

    @media (max-width: 600px) {
      .scene-wrapper {
        padding: 0.25rem;
      }
      .scene {
        border-radius: 18px;
      }
      .house {
        transform: scale(0.9);
        transform-origin: bottom left;
      }
      .graveyard {
        transform: scale(0.9);
        transform-origin: bottom right;
      }
    }
  </style>
</head>
<body>
  <header class="sr-only">
    <h1>Spooky Halloween Scene</h1>
    <p>CSS-only animated Halloween scene with a haunted house.</p>
  </header>

  <main class="scene-wrapper">
    <div class="controls">
      <input type="checkbox" id="spookyToggle" class="toggle-input" />
      <label for="spookyToggle" class="toggle-label">
        <span class="toggle-knob" aria-hidden="true"></span>
        <span class="toggle-text">Spookify scene</span>
      </label>
    </div>

    <div class="scene">
      <div class="sky">
        <div class="moon"></div>
        <div class="cloud cloud--1"></div>
        <div class="cloud cloud--2"></div>
        <div class="cloud cloud--3"></div>
        <div class="stars"></div>
      </div>

      <div class="hill"></div>

      <section class="house" aria-label="Haunted house">
        <div class="house-body">
          <div class="window window--left"></div>
          <div class="window window--right"></div>
          <div class="door">
            <div class="door-inner"></div>
          </div>
        </div>
        <div class="roof"></div>
        <div class="chimney"></div>
      </section>

      <section class="graveyard" aria-label="Graveyard">
        <div class="grave grave--1"></div>
        <div class="grave grave--2"></div>
      </section>

      <div class="pumpkin" aria-label="Pumpkin">
        <div class="pumpkin-eye pumpkin-eye--left"></div>
        <div class="pumpkin-eye pumpkin-eye--right"></div>
        <div class="pumpkin-mouth"></div>
      </div>

      <div class="ghost ghost--main" aria-hidden="true">
        <div class="ghost-body">
          <div class="ghost-eye ghost-eye--left"></div>
          <div class="ghost-eye ghost-eye--right"></div>
          <div class="ghost-mouth"></div>
        </div>
      </div>

      <div class="ghost ghost--secondary" aria-hidden="true">
        <div class="ghost-body">
          <div class="ghost-eye ghost-eye--left"></div>
          <div class="ghost-eye ghost-eye--right"></div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
